<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px; margin: 0; padding: 16px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0a; color: #e5e7eb;
      }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; margin-bottom: 14px; }
      .logo { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center;
        justify-content: center; color: #fff; font-weight: 800;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
      input { width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 9px 10px;
        border-radius: 9px; border: 1px solid rgba(255,255,255,.12); background: #111827; color: #fff; }
      button { width: 100%; padding: 10px; border: none; border-radius: 10px; cursor: pointer;
        font-weight: 600; color: #fff; background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
      button.secondary { background: rgba(255,255,255,.08); }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      .msg { font-size: 12px; color: #9ca3af; margin: 8px 0; min-height: 16px; }
      .hidden { display: none; }
      .who { font-size: 12px; color: #cbd5e1; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="brand"><span class="logo">O</span> OLat5 Copilot</div>

    <div id="login-view">
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="login-btn">Log in</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <div id="session-view" class="hidden">
      <div class="who" id="who"></div>
      <button id="start-btn">Start Live Copilot</button>
      <div class="row">
        <button id="dashboard-btn" class="secondary">Dashboard</button>
        <button id="logout-btn" class="secondary">Log out</button>
      </div>
      <div class="msg" id="session-msg"></div>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
