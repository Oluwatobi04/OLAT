<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="olat5-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="olat5-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="olat5-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded gradient tile -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#olat5-bg)"/>
  <rect x="2" y="2" width="124" height="124" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- stylized falcon: head + swept wings -->
  <g filter="url(#olat5-glow)" fill="url(#olat5-mark)">
    <!-- left wing -->
    <path d="M64 40 C50 40 36 48 24 68 C40 62 50 62 60 66 C52 70 46 78 42 90 C56 78 64 74 64 74 Z"/>
    <!-- right wing -->
    <path d="M64 40 C78 40 92 48 104 68 C88 62 78 62 68 66 C76 70 82 78 86 90 C72 78 64 74 64 74 Z"/>
    <!-- head + beak -->
    <path d="M64 34 C69 34 73 38 73 44 C73 49 70 52 66 53 L78 58 L66 59 C66 66 64 74 64 74 C64 74 62 66 62 59 L50 58 L62 53 C58 52 55 49 55 44 C55 38 59 34 64 34 Z"/>
  </g>
</svg>
